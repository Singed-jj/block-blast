name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/block-blast/block-blast

      - name: Setup export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp /root/.local/share/godot/export_templates/4.6.1.stable/* "$TEMPLATE_DIR/"

      - name: Import project resources
        run: godot --headless --import 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p dist
          godot --headless --export-release "Web" dist/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: dist/

  deploy:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: dist/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel prebuilt output
        run: |
          mkdir -p .vercel/output/static
          cp dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/(.*)",
                "headers": {
                  "Cross-Origin-Opener-Policy": "same-origin",
                  "Cross-Origin-Embedder-Policy": "require-corp"
                },
                "continue": true
              }
            ]
          }
          EOF

      - name: Link Vercel project
        run: |
          echo '{"orgId":"'$VERCEL_ORG_ID'","projectId":"'$VERCEL_PROJECT_ID'"}' > .vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
