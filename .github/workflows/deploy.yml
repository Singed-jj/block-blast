name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          echo "HOME=$HOME"
          echo "--- Finding templates ---"
          find / -name "*.zip" -path "*/templates/*" 2>/dev/null || true
          find / -name "web_*" 2>/dev/null || true
          echo "--- /root contents ---"
          ls -la /root/.local/share/godot/ 2>/dev/null || echo "no /root/.local/share/godot"
          ls -la /root/.local/share/godot/templates/ 2>/dev/null || echo "no templates dir"
          ls -la /root/.local/share/godot/export_templates/ 2>/dev/null || echo "no export_templates dir"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp /root/.local/share/godot/templates/* "$TEMPLATE_DIR/" 2>/dev/null || true
          cp /root/.local/share/godot/export_templates/4.6.1.stable/* "$TEMPLATE_DIR/" 2>/dev/null || true
          echo "--- Result ---"
          ls -la "$TEMPLATE_DIR/" || echo "empty"

      - name: Import project resources
        run: godot --headless --import 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p dist
          godot --headless --export-release "Web" dist/index.html

      - name: Add COOP/COEP headers config
        run: |
          cat > dist/vercel.json << 'EOF'
          {
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" },
                  { "key": "Cross-Origin-Embedder-Policy", "value": "require-corp" }
                ]
              }
            ]
          }
          EOF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist
          vercel-args: '--prod'
