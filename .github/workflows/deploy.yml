name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp /root/.local/share/godot/export_templates/4.6.1.stable/* "$TEMPLATE_DIR/"

      - name: Import project resources
        run: godot --headless --import 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p dist
          godot --headless --verbose --export-release "Web" dist/index.html 2>&1 || true
          ls -la dist/

      - name: Verify export
        run: |
          if [ ! -f dist/index.html ]; then
            echo "Export failed - trying export-debug"
            godot --headless --verbose --export-debug "Web" dist/index.html 2>&1
          fi
          ls -la dist/

      - name: Add COOP/COEP headers config
        run: |
          cat > dist/vercel.json << 'EOFVERCEL'
          {
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" },
                  { "key": "Cross-Origin-Embedder-Policy", "value": "require-corp" }
                ]
              }
            ]
          }
          EOFVERCEL

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist
          vercel-args: '--prod'
